version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - matchmaking_db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/matchmaking.db
      - SMTP_HOST=smtp.zone.eu
      - SMTP_PORT=587
      - SMTP_USER=meetings@personomist.com
      - SMTP_PASS=****
      - FROM_EMAIL=meetings@personomist.com
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  matchmaking_db:
