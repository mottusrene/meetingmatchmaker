version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - matchmaking_db:/app/data
    # Bind mount or modify database.py to save db to /app/data so it persists!
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/matchmaking.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # /api-proxy is a relative path — the browser calls the same host:port as the
        # frontend, and Next.js rewrites those requests to http://backend:8000 internally.
        # This means the app works on any server without knowing its IP at build time.
        - NEXT_PUBLIC_API_URL=/api-proxy
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  matchmaking_db:
