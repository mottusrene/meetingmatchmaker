version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - matchmaking_db:/app/data
    # Bind mount or modify database.py to save db to /app/data so it persists!
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/matchmaking.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000 # Default to localhost for local browser access
    depends_on:
      - backend
    restart: always

volumes:
  matchmaking_db:
