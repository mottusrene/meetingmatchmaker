version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # localhost only — the browser reaches the API via the nginx /api/ proxy
      - "127.0.0.1:8000:8000"
    volumes:
      - matchmaking_db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/matchmaking.db
      # Postmark (preferred email transport; set the server token to enable)
      - POSTMARK_SERVER_TOKEN=
      - POSTMARK_MESSAGE_STREAM=outbound
      # SMTP fallback (used only when POSTMARK_SERVER_TOKEN is empty)
      - SMTP_HOST=smtp.zone.eu
      - SMTP_PORT=587
      - SMTP_USER=meetings@personomist.com
      - SMTP_PASS=****
      - FROM_EMAIL=meetings@personomist.com
      - FRONTEND_URL=https://meetingmatches.com
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  matchmaking_db:
